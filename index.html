<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CU Career Student Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fc;
      --frame: #ffffff;
      --line: #e6eaf2;
      --text: #1a1f2c;
      --muted: #7b8395;
      --blue: #5a56f6;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(90, 86, 246, 0.08), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 28px;
    }

    .app {
      width: min(100%, 1360px);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      position: relative;
      width: 30px;
      height: 30px;
    }

    .brand-mark span {
      position: absolute;
      display: block;
      border: 1.8px solid #11151f;
      transform: rotate(45deg);
    }

    .brand-mark span:nth-child(1) {
      left: 0;
      top: 9px;
      width: 14px;
      height: 14px;
    }

    .brand-mark span:nth-child(2) {
      right: 0;
      top: 0;
      width: 14px;
      height: 14px;
    }

    .brand-mark span:nth-child(3) {
      left: 8px;
      bottom: 0;
      width: 14px;
      height: 14px;
    }

    .brand-copy {
      font-size: 14px;
      font-weight: 800;
      line-height: 0.92;
      text-transform: uppercase;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
    }

    .frame {
      position: relative;
      width: 100%;
      border-radius: 32px;
      overflow: hidden;
      background: var(--frame);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      aspect-ratio: 1280 / 853;
    }

    .frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      border: 0;
      background: transparent;
      border-radius: 18px;
      cursor: pointer;
    }

    .hotspot:hover {
      box-shadow: inset 0 0 0 2px rgba(90, 86, 246, 0.24);
      background: rgba(90, 86, 246, 0.04);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .toolbar button {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      color: #42495a;
      font-size: 14px;
      font-weight: 600;
    }

    .toolbar button.active {
      border-color: rgba(90, 86, 246, 0.18);
      background: rgba(90, 86, 246, 0.08);
      color: var(--blue);
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 50;
      display: none;
      padding: 14px 18px;
      border-radius: 16px;
      background: #1f2432;
      color: white;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.18);
    }

    .toast.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topline">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="brand-copy">Центральный<br>университет</div>
      </div>
      <div class="meta">
        <div class="chip">Кликабельный прототип</div>
        <div class="chip">4 новых референса</div>
      </div>
    </div>

    <div class="frame">
      <img id="screenImage" src="./request.jpg" alt="CU Career student screen">
      <div id="hotspots"></div>
    </div>

    <div class="toolbar" id="toolbar"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const screens = {
      request: {
        title: "Заявка",
        src: "./request.jpg",
        hotspots: [
          { x: 20, y: 113, w: 170, h: 38, go: "request" },
          { x: 20, y: 172, w: 170, h: 38, go: "vacancies" },
          { x: 256, y: 747, w: 219, h: 38, go: "resume" },
          { x: 249, y: 170, w: 185, h: 74, go: "request" },
          { x: 516, y: 170, w: 275, h: 74, go: "resume" },
          { x: 763, y: 170, w: 270, h: 74, go: "assessment" },
          { x: 1020, y: 170, w: 220, h: 74, go: "vacancies" }
        ]
      },
      resume: {
        title: "Резюме",
        src: "./resume.jpg",
        hotspots: [
          { x: 20, y: 113, w: 170, h: 38, go: "resume" },
          { x: 20, y: 172, w: 170, h: 38, go: "vacancies" },
          { x: 421, y: 567, w: 140, h: 46, toast: "Резюме загружено" },
          { x: 933, y: 571, w: 162, h: 45, go: "assessment" },
          { x: 250, y: 170, w: 251, h: 74, go: "request" },
          { x: 522, y: 184, w: 173, h: 74, go: "resume" },
          { x: 791, y: 184, w: 171, h: 74, go: "assessment" },
          { x: 1049, y: 184, w: 171, h: 74, go: "vacancies" }
        ]
      },
      assessment: {
        title: "Assessment",
        src: "./assesment.jpg",
        hotspots: [
          { x: 20, y: 113, w: 170, h: 38, go: "assessment" },
          { x: 20, y: 172, w: 170, h: 38, go: "vacancies" },
          { x: 273, y: 675, w: 451, h: 35, go: "vacancies", toast: "Время assessment забронировано" },
          { x: 769, y: 359, w: 410, h: 66, toast: "Открыт материал: Алгоритмы и структуры данных" },
          { x: 769, y: 435, w: 410, h: 66, toast: "Открыт материал: SQL: базовые запросы" },
          { x: 769, y: 511, w: 410, h: 66, toast: "Открыт материал: Python: основы" },
          { x: 769, y: 587, w: 410, h: 66, toast: "Открыт материал: Примеры задач" },
          { x: 769, y: 666, w: 410, h: 42, toast: "Открыт список всех материалов" },
          { x: 249, y: 170, w: 247, h: 74, go: "request" },
          { x: 518, y: 170, w: 245, h: 74, go: "resume" },
          { x: 763, y: 183, w: 179, h: 74, go: "assessment" },
          { x: 1049, y: 183, w: 173, h: 74, go: "vacancies" }
        ]
      },
      vacancies: {
        title: "Вакансии",
        src: "./vaacncies.jpg",
        hotspots: [
          { x: 20, y: 113, w: 170, h: 38, go: "request" },
          { x: 20, y: 172, w: 170, h: 38, go: "vacancies" },
          { x: 1056, y: 355, w: 133, h: 48, toast: "Отклик отправлен на Junior Backend Developer" },
          { x: 1056, y: 479, w: 133, h: 48, toast: "Отклик отправлен на Data Analyst Junior" },
          { x: 1056, y: 603, w: 133, h: 48, toast: "Отклик отправлен на Frontend Developer (React)" },
          { x: 1056, y: 727, w: 133, h: 48, toast: "Отклик отправлен на QA Engineer" },
          { x: 249, y: 170, w: 247, h: 74, go: "request" },
          { x: 518, y: 170, w: 245, h: 74, go: "resume" },
          { x: 766, y: 170, w: 243, h: 74, go: "assessment" },
          { x: 1021, y: 177, w: 193, h: 74, go: "vacancies" }
        ]
      }
    };

    const order = ["request", "resume", "assessment", "vacancies"];
    const frameWidth = 1280;
    const frameHeight = 853;

    const state = {
      screen: "request"
    };

    const image = document.getElementById("screenImage");
    const hotspotsRoot = document.getElementById("hotspots");
    const toolbar = document.getElementById("toolbar");
    const toastEl = document.getElementById("toast");

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    function renderToolbar() {
      toolbar.innerHTML = order.map((id) => `
        <button class="${state.screen === id ? "active" : ""}" data-screen="${id}">
          ${screens[id].title}
        </button>
      `).join("");
    }

    function renderScreen() {
      const screen = screens[state.screen];
      image.src = screen.src;
      image.alt = screen.title;

      hotspotsRoot.innerHTML = screen.hotspots.map((spot, index) => `
        <button
          class="hotspot"
          data-index="${index}"
          style="
            left:${(spot.x / frameWidth) * 100}%;
            top:${(spot.y / frameHeight) * 100}%;
            width:${(spot.w / frameWidth) * 100}%;
            height:${(spot.h / frameHeight) * 100}%;
          "
          aria-label="${spot.go ? `Перейти: ${screens[spot.go].title}` : "Действие на экране"}"
        ></button>
      `).join("");

      renderToolbar();
    }

    toolbar.addEventListener("click", (event) => {
      const button = event.target.closest("[data-screen]");
      if (!button) return;
      state.screen = button.dataset.screen;
      renderScreen();
    });

    hotspotsRoot.addEventListener("click", (event) => {
      const button = event.target.closest("[data-index]");
      if (!button) return;

      const screen = screens[state.screen];
      const spot = screen.hotspots[Number(button.dataset.index)];
      if (!spot) return;

      if (spot.toast) {
        showToast(spot.toast);
      }

      if (spot.go) {
        state.screen = spot.go;
        renderScreen();
      }
    });

    document.addEventListener("keydown", (event) => {
      const currentIndex = order.indexOf(state.screen);
      if (event.key === "ArrowRight" && currentIndex < order.length - 1) {
        state.screen = order[currentIndex + 1];
        renderScreen();
      }
      if (event.key === "ArrowLeft" && currentIndex > 0) {
        state.screen = order[currentIndex - 1];
        renderScreen();
      }
    });

    renderScreen();
  </script>
</body>
</html>
